name: grill-me-kor
display_name: Grill Me (Feature Planner)
description: >-
  Plan one new feature on an existing project. Scans the repo, asks simple
  bilingual Korean/English questions, then writes or updates AGENTS.md,
  OVERVIEW.md, and KANBAN.md, and offers to implement.
triggers:
  - grill me
  - 만들고 싶어
  - 새로 만들고 싶어
  - 추가하고 싶어
  - 뭐 만들래
  - 이거 만들어줘
  - 새 기능 추가